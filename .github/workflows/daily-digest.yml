name: Daily Showbiz Digest

on:
  schedule:
    - cron: '0 7 * * *'   # каждый день в 7:00 UTC ≈ 10:00 МСК
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # можно оставить v4 — он уже поддерживает, но warning иногда остаётся
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5   # или обнови до v6, если хочешь
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python main.py

      - name: Commit seen_articles.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_articles.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update seen_articles.json [skip ci]"
            git push
          fi
