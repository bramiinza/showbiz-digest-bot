name: Daily Showbiz Digest

on:
  schedule:
    - cron: '0 7 * * *'   # каждый день в 7:00 UTC (10:00 МСК)
  workflow_dispatch:      # можно запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python main.py

      - name: Commit seen_articles.json if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add seen_articles.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update seen_articles.json"
          git push
